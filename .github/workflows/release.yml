name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true

env:
  NODE_VERSION: '18'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install CLI dependencies
        run: npm ci

      - name: Install Server dependencies
        run: cd server && npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: |
          npm run build
          cd server && npm run build

      - name: Run tests
        run: |
          npm test
          cd server && npm test

  build-binaries:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd server && npm ci

      - name: Build
        run: |
          npm run build
          cd server && npm run build

      - name: Create binary archives
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p release

          tar -czvf release/semi-nexus-cli-${VERSION}-linux-x64.tar.gz -C dist .
          tar -czvf release/semi-nexus-server-${VERSION}-linux-x64.tar.gz -C server/dist .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: release/*
          retention-days: 7

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:latest
            ghcr.io/${{ github.repository }}/server:${{ steps.version.outputs.version }}

  release:
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: release

      - name: Get version
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > release_notes.md << EOF
          ## SemiNexus CLI ${VERSION}

          ### Downloads

          #### Binary Packages
          | Component | File |
          |-----------|------|
          | CLI | semi-nexus-cli-${VERSION}-linux-x64.tar.gz |
          | Server | semi-nexus-server-${VERSION}-linux-x64.tar.gz |

          ### Docker Images
          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}/server:${VERSION}
          \`\`\`

          ### Installation (Rocky Linux 8.10)
          \`\`\`bash
          # Download and extract
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/semi-nexus-cli-${VERSION}-linux-x64.tar.gz
          tar -xzf semi-nexus-cli-${VERSION}-linux-x64.tar.gz
          node index.js init
          \`\`\`

          ### Quick Start
          \`\`\`bash
          # Initialize
          ./semi-nexus init --server http://your-server:3000

          # Login
          ./semi-nexus login

          # Search capabilities
          ./semi-nexus search "rtl"
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
